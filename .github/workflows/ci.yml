name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Detect changed components
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let changedFiles = [];

            if (context.eventName === 'pull_request') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100
              });
              changedFiles = files.map((file) => file.filename);
            } else {
              if (!context.payload.before || /^0+$/.test(context.payload.before)) {
                core.setOutput('backend', 'true');
                core.setOutput('frontend', 'true');
                return;
              }

              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${context.payload.before}...${context.sha}`
              });
              changedFiles = comparison.data.files?.map((file) => file.filename) ?? [];
            }

            const touches = (prefix) => changedFiles.some((file) => file.startsWith(prefix));
            const workflowChanged = changedFiles.includes('.github/workflows/ci.yml');

            core.setOutput('backend', String(workflowChanged || touches('api/')));
            core.setOutput('frontend', String(workflowChanged || touches('frontend/')));

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: partygame_test
          POSTGRES_USER: partygame
          POSTGRES_PASSWORD: partygame
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U partygame -d partygame_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6379:6379
    env:
      POSTGRES_TEST_DATABASE_URL: postgresql+asyncpg://partygame:partygame@localhost:5432/partygame_test
      POSTGRES_HOST: localhost
      POSTGRES_DB: partygame_test
      POSTGRES_USER: partygame
      POSTGRES_PASSWORD: partygame
      VALKEY_HOST: localhost
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run Ruff
        run: poetry run ruff check .

      - name: Check Black formatting
        run: poetry run black --check .

      - name: Run tests
        run: poetry run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Svelte checks
        run: pnpm run check

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
