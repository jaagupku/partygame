name: Publish Images

on:
  push:
    branches:
      - master
    paths:
      - api/**
      - frontend/**
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/api
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  build:
    name: Build and publish images
    runs-on: ubuntu-latest
    outputs:
      api-image: ${{ steps.image-names.outputs.api-image }}
      frontend-image: ${{ steps.image-names.outputs.frontend-image }}
      tag: ${{ steps.image-names.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image-names
        run: |
          echo "api-image=${REGISTRY}/${API_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
          echo "frontend-image=${REGISTRY}/${FRONTEND_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ steps.image-names.outputs.api-image }}:${{ steps.image-names.outputs.tag }}
            ${{ steps.image-names.outputs.api-image }}:main
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.image-names.outputs.frontend-image }}:${{ steps.image-names.outputs.tag }}
            ${{ steps.image-names.outputs.frontend-image }}:main
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
