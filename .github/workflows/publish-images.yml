name: Publish Images

on:
  push:
    branches:
      - master
    paths:
      - api/**
      - frontend/**
      - .github/workflows/publish-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/api
  FRONTEND_IMAGE_NAME: ${{ github.repository }}/frontend

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Detect changed components
        id: filter
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let changedFiles = [];

            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('api', 'true');
              core.setOutput('frontend', 'true');
              return;
            }

            if (!context.payload.before || /^0+$/.test(context.payload.before)) {
              core.setOutput('api', 'true');
              core.setOutput('frontend', 'true');
              return;
            }

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${context.payload.before}...${context.sha}`
            });
            changedFiles = comparison.data.files?.map((file) => file.filename) ?? [];

            const touches = (prefix) => changedFiles.some((file) => file.startsWith(prefix));
            const workflowChanged = changedFiles.includes('.github/workflows/publish-images.yml');

            core.setOutput('api', String(workflowChanged || touches('api/')));
            core.setOutput('frontend', String(workflowChanged || touches('frontend/')));

  api:
    name: Build and publish API image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image-names
        run: |
          echo "api-image=${REGISTRY}/${API_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ${{ steps.image-names.outputs.api-image }}:${{ steps.image-names.outputs.tag }}
            ${{ steps.image-names.outputs.api-image }}:main
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  frontend:
    name: Build and publish frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image-names
        run: |
          echo "frontend-image=${REGISTRY}/${FRONTEND_IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ steps.image-names.outputs.frontend-image }}:${{ steps.image-names.outputs.tag }}
            ${{ steps.image-names.outputs.frontend-image }}:main
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
